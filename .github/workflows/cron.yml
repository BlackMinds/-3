name: Scheduled Tasks

on:
  schedule:
    # Boss 过期检查 — 每 10 分钟
    - cron: '*/10 * * * *'
    # 每日重置 — 每天 UTC 16:00（北京 00:00）
    - cron: '0 16 * * *'
    # 每周重置 — 每周一 UTC 16:00（北京 00:00）
    - cron: '0 16 * * 1'
    # 天道造化抽奖 — 北京 08:00~23:30 每 30 分钟（= UTC 00:00~15:30）
    - cron: '*/30 0-15 * * *'
    # 斗法榜每日奖励 — 每天 UTC 04:00（北京 12:00）
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  APP_URL: ${{ secrets.APP_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  boss-expire:
    if: github.event.schedule == '*/10 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check expired bosses
        run: |
          curl -sfL -X POST "$APP_URL/api/cron/boss-expire" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 30

  daily-reset:
    if: github.event.schedule == '0 16 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Daily donation reset
        run: |
          curl -sfL -X POST "$APP_URL/api/cron/daily-reset" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 30

  weekly-reset:
    if: github.event.schedule == '0 16 * * 1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Weekly contribution reset
        run: |
          curl -sfL -X POST "$APP_URL/api/cron/weekly-reset" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 30

  random-event-tick:
    if: github.event.schedule == '*/30 0-15 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Random event draw
        run: |
          curl -sfL -X POST "$APP_URL/api/cron/random-event-tick" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 30

  arena-tick:
    if: github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Arena daily top 10 reward
        run: |
          curl -sfL -X POST "$APP_URL/api/cron/arena-tick" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 60
